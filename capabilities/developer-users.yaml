naftiko: 1.0.0-alpha2
info:
  label: Ramp Developer API — Users
  description: 'Ramp Developer API — Users. 1 operations. Lead operation: List users. Self-contained Naftiko capability covering
    one Ramp business surface.'
  tags:
  - Ramp
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAMP_API_KEY: RAMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: developer-users
    baseUri: https://api.ramp.com/developer/v1
    description: Ramp Developer API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: List users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.RAMP_API_KEY}}'
  exposes:
  - type: rest
    namespace: developer-users-rest
    port: 8080
    description: REST adapter for Ramp Developer API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: List users
        call: developer-users.listusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: developer-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ramp Developer API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-users
      description: List users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: developer-users.listusers
      outputParameters:
      - type: object
        mapping: $.
