aid: ramp
name: Ramp
description: Ramp is a finance automation platform that combines corporate cards,
  expense management, accounts payable, vendor management, and accounting integrations
  into a single product. The Ramp Developer API enables developers to access and manage
  Ramp account data, build applications for the Ramp App Center reaching over 25,000
  Ramp customers, and automate financial workflows by integrating Ramp into existing
  systems.
