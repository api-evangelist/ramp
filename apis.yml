apis:
- aid: ramp:ramp-developer-api
  name: Ramp Developer API
  description: The Ramp Developer API enables developers to programmatically access
    and manage Ramp account data, build applications for the Ramp App Center, and
    automate financial workflows. It provides resources for transactions, cards, users,
    departments, locations, vendors, accounting integrations, reimbursements, bills,
    and statements, supporting both reporting and automation use cases.
  humanURL: https://docs.ramp.com/developer-api/v1/overview/introduction
